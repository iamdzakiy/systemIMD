<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker Kepanitiaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* (sama seperti sebelumnya, bisa disalin dari jawaban sebelumnya) */
        * { font-family: 'Inter', system-ui; }
        body { background: #f1f5f9; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        .tag-pill { font-size: 0.65rem; font-weight: 600; padding: 0.2rem 0.7rem; border-radius: 9999px; background: #e2e8f0; color: #1e293b; }
        .tag-pill.all { background: #1e293b; color: white; }
        .status-badge { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; padding: 0.15rem 0.6rem; border-radius: 9999px; }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .status-badge.in_progress { background: #dbeafe; color: #1e40af; }
        .status-badge.done { background: #d1fae5; color: #065f46; }
        .status-badge.approved { background: #a7f3d0; color: #065f46; }
        .status-badge.archived { background: #e5e7eb; color: #374151; }
        .deadline-warning { animation: pulse-warning 1.8s ease-in-out infinite; }
        @keyframes pulse-warning { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .tab-active { border-bottom: 2px solid #1e293b; color: #1e293b; font-weight: 600; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
        input, select, textarea { transition: all 0.15s ease; }
        input:focus, select:focus, textarea:focus { outline: none; ring: 2px solid #1e293b; border-color: #1e293b; }
        .btn-primary { background: #1e293b; color: white; padding: 0.5rem 1.2rem; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center; }
        .btn-primary:hover { background: #0f172a; transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; color: #1e293b; border: 1px solid #cbd5e1; padding: 0.5rem 1.2rem; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; transition: all 0.15s ease; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-success { background: #065f46; color: white; padding: 0.5rem 1.2rem; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; transition: all 0.15s ease; }
        .btn-success:hover { background: #047857; }
        .btn-danger { background: #991b1b; color: white; padding: 0.5rem 1.2rem; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; transition: all 0.15s ease; }
        .btn-danger:hover { background: #7f1d1d; }
        .modal-overlay { background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); }
        .modal-content { max-height: 90vh; overflow-y: auto; }
        .custom-checkbox { width: 1.2rem; height: 1.2rem; border-radius: 0.25rem; border: 2px solid #94a3b8; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; flex-shrink: 0; }
        .custom-checkbox.checked { background: #1e293b; border-color: #1e293b; color: white; }
        .custom-checkbox:hover { border-color: #1e293b; }
        .custom-checkbox.checked:hover { background: #0f172a; }
        .dot-div { width: 10px; height: 10px; border-radius: 9999px; display: inline-block; flex-shrink: 0; }
        #loginScreen { display: flex; }
        #app { display: none; }
        #loginScreen.hidden { display: none !important; }
        #app.visible { display: block; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; color: white; padding: 0.8rem 1.5rem; border-radius: 1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); font-size: 0.9rem; z-index: 999; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #065f46; }
        .toast.error { background: #991b1b; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="glass-card rounded-2xl p-8 w-full max-w-sm shadow-2xl border border-slate-200/60">
            <h1 class="text-2xl font-bold text-slate-800 mb-1 text-center">Task Tracker</h1>
            <p class="text-sm text-slate-500 text-center mb-6">Kepanitiaan • Login Divisi</p>
            <form id="loginForm" onsubmit="loginWithDivision(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Kode Divisi</label>
                    <input id="loginCode" type="text" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200" placeholder="Contoh: KON" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <input id="loginPassword" type="password" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200" placeholder="Masukkan password divisi" />
                </div>
                <button type="submit" class="btn-primary w-full">Masuk</button>
                <div id="loginError" class="text-red-500 text-sm text-center hidden"></div>
            </form>
            <p class="text-xs text-slate-400 text-center mt-4">Hubungi ketua untuk mendapatkan kode dan password divisi</p>
        </div>
    </div>

    <!-- APP -->
    <div id="app" class="max-w-6xl mx-auto px-4 py-6 md:py-10">
        <!-- header, filter, tab, task list, modals - sama persis seperti sebelumnya -->
        <!-- (saya singkat agar tidak terlalu panjang, tapi kode lengkap ada di jawaban sebelumnya) -->
        <!-- Anda bisa salin bagian ini dari jawaban pertama atau gunakan kode di bawah ini -->
        <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                    <i class="fas fa-tasks text-slate-700"></i>
                    Task Tracker
                    <span class="text-sm font-normal text-slate-400 ml-2">Kepanitiaan</span>
                </h1>
                <p class="text-sm text-slate-500 mt-0.5">Kelola tugas divisi, QC, dan arsip dengan mudah</p>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <div class="flex items-center gap-2 text-sm bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-200">
                    <i class="fas fa-user-circle text-slate-400"></i>
                    <span id="userRoleDisplay" class="font-medium text-slate-700">Ketua</span>
                    <button onclick="logout()" class="text-xs text-red-400 hover:text-red-700 underline-offset-2 underline ml-1">logout</button>
                </div>
                <button onclick="openTaskModal()" class="btn-primary"><i class="fas fa-plus text-sm"></i> Tugas Baru</button>
            </div>
        </header>

        <div class="glass-card rounded-2xl shadow-sm p-4 mb-6 flex flex-wrap items-center gap-3 border border-slate-200/60">
            <div class="flex items-center gap-2 text-sm text-slate-500 mr-2"><i class="fas fa-tags"></i><span>Divisi:</span></div>
            <div id="filterContainer" class="flex flex-wrap gap-1.5"></div>
            <div class="ml-auto flex items-center gap-3 text-sm">
                <span class="text-slate-400">|</span>
                <span id="taskCount" class="text-slate-600 font-medium">0 tugas</span>
                <button onclick="refreshData()" class="text-slate-400 hover:text-slate-700 transition"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>

        <div class="flex border-b border-slate-200/70 mb-6 gap-1 overflow-x-auto scrollbar-thin">
            <button onclick="setTab('active')" data-tab="active" class="tab-btn px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition border-b-2 border-transparent hover:border-slate-300 whitespace-nowrap"><i class="fas fa-list-ul mr-1.5"></i> Aktif</button>
            <button onclick="setTab('archive')" data-tab="archive" class="tab-btn px-4 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-800 transition border-b-2 border-transparent hover:border-slate-300 whitespace-nowrap"><i class="fas fa-archive mr-1.5"></i> Arsip</button>
        </div>

        <div id="taskListContainer" class="space-y-3 fade-in"></div>
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-5xl text-slate-300 mb-4"><i class="fas fa-inbox"></i></div>
            <h3 class="text-slate-500 font-medium">Belum ada tugas</h3>
            <p class="text-slate-400 text-sm mt-1">Buat tugas baru dengan tombol di atas</p>
        </div>

        <!-- MODALS (sama) -->
        <div id="taskModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">...</div>
        <div id="evidenceModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">...</div>
        <div id="approvalModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4">...</div>
    </div>

    <script>
        // FIREBASE CONFIG - ganti dengan milik Anda atau biarkan dummy untuk mode mock
        const firebaseConfig = {
            apiKey: "AIzaSyAmuHB9vZIk-SsJnmXktH8HMRJ2NeaBH9s",
            authDomain: "imd-system.firebaseapp.com",
            projectId: "imd-system",
            storageBucket: "imd-system.firebasestorage.app",
            messagingSenderId: "859930056327",
            appId: "1:859930056327:web:fe0526b1acb6d650638a22",
            measurementId: "G-Y9V0HT0KX0"
        };

        let app, db;
        try {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.firestore(app);
            db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
            console.log('✅ Firebase terhubung');
        } catch (e) {
            console.warn('Firebase init error, menggunakan mock data:', e);
            db = null;
        }

        // STATE
        let currentUserRole = 'anggota';
        let currentUserDivision = null;
        let currentFilter = 'all';
        let currentTab = 'active';
        let allDivisions = [];
        let allTasks = [];
        let editingTaskId = null;
        let unsubscribeTasks = null;

        // DOM helpers
        const $ = id => document.getElementById(id);
        const taskListContainer = $('taskListContainer');
        const emptyState = $('emptyState');
        const filterContainer = $('filterContainer');
        const taskCount = $('taskCount');
        const userRoleDisplay = $('userRoleDisplay');
        const toast = $('toast');

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        // ========== LOGIN ==========
        async function loginWithDivision(e) {
            e.preventDefault();
            const code = $('loginCode').value.trim().toUpperCase();
            const password = $('loginPassword').value.trim();
            const errorEl = $('loginError');

            if (!code || !password) {
                errorEl.textContent = 'Harap isi kode dan password.';
                errorEl.classList.remove('hidden');
                return;
            }

            // Jika db null, gunakan mock
            if (!db) {
                if (code === 'KON' && password === 'kon123') { loginSuccess('div-1', 'anggota'); return; }
                if (code === 'CHAIR' && password === 'ketua123') { loginSuccess('chair', 'ketua'); return; }
                errorEl.textContent = 'Kode atau password salah (mock).';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                // Cek apakah koleksi divisions ada, jika tidak, buat default
                const check = await db.collection('divisions').limit(1).get();
                if (check.empty) {
                    // Seed default divisions
                    const defaults = [
                        { name: 'Konsumsi', code: 'KON', password: 'kon123', isChair: false },
                        { name: 'Acara', code: 'ACR', password: 'acr123', isChair: false },
                        { name: 'Dekorasi', code: 'DEK', password: 'dek123', isChair: false },
                        { name: 'Dokumentasi', code: 'DOK', password: 'dok123', isChair: false },
                        { name: 'Kesekretariatan', code: 'SEK', password: 'sek123', isChair: false },
                        { name: 'Perlengkapan', code: 'PER', password: 'per123', isChair: false },
                        { name: 'Humas', code: 'HUM', password: 'hum123', isChair: false },
                        { name: 'Ketua', code: 'CHAIR', password: 'ketua123', isChair: true },
                    ];
                    for (const d of defaults) {
                        await db.collection('divisions').add(d);
                    }
                    showToast('Divisi default telah dibuat. Silakan login lagi.', 'success');
                    // reload halaman atau biarkan user mencoba lagi
                    return;
                }

                // Cari divisi berdasarkan code
                const snapshot = await db.collection('divisions')
                    .where('code', '==', code)
                    .get();

                if (snapshot.empty) {
                    errorEl.textContent = 'Kode divisi tidak ditemukan.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                const doc = snapshot.docs[0];
                const data = doc.data();
                if (data.password !== password) {
                    errorEl.textContent = 'Password salah.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                const divisionId = doc.id;
                const role = data.isChair ? 'ketua' : 'anggota';
                loginSuccess(divisionId, role);

            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Terjadi kesalahan. Coba lagi.';
                errorEl.classList.remove('hidden');
            }
        }

        function loginSuccess(divisionId, role) {
            localStorage.setItem('userDivision', divisionId);
            localStorage.setItem('userRole', role);
            currentUserDivision = divisionId;
            currentUserRole = role;
            currentFilter = (role === 'ketua') ? 'all' : divisionId;

            $('loginScreen').classList.add('hidden');
            $('app').classList.add('visible');
            userRoleDisplay.textContent = (role === 'ketua') ? 'Ketua' : 'Anggota';
            loadDivisionsAndTasks();
            showToast(`Selamat datang ${role === 'ketua' ? 'Ketua' : 'Anggota'}!`, 'success');
        }

        function logout() {
            localStorage.removeItem('userDivision');
            localStorage.removeItem('userRole');
            if (unsubscribeTasks) { unsubscribeTasks(); unsubscribeTasks = null; }
            $('app').classList.remove('visible');
            $('loginScreen').classList.remove('hidden');
            $('loginForm').reset();
            $('loginError').classList.add('hidden');
            currentUserDivision = null;
            currentUserRole = 'anggota';
            allTasks = [];
            allDivisions = [];
            renderAll();
            showToast('Anda telah logout.', 'info');
        }

        // ========== LOAD DATA ==========
        async function loadDivisionsAndTasks() {
            if (!db) {
                loadMockData();
                return;
            }
            try {
                const divSnap = await db.collection('divisions').get();
                allDivisions = divSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                if (unsubscribeTasks) unsubscribeTasks();
                let query = db.collection('tasks');
                if (currentUserRole !== 'ketua' && currentUserDivision) {
                    query = query.where('divisionId', '==', currentUserDivision);
                }
                query = query.orderBy('createdAt', 'desc');
                unsubscribeTasks = query.onSnapshot((snapshot) => {
                    allTasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderAll();
                }, (error) => {
                    console.error('Listener error:', error);
                    showToast('Gagal sinkronisasi realtime', 'error');
                });
            } catch (err) {
                console.error('Load data error:', err);
                loadMockData();
            }
        }

        function loadMockData() {
            // sama seperti sebelumnya
            if (allDivisions.length === 0) {
                allDivisions = [
                    { id: 'div-1', name: 'Konsumsi', code: 'KON', password: 'kon123', isChair: false },
                    { id: 'div-2', name: 'Acara', code: 'ACR', password: 'acr123', isChair: false },
                    { id: 'div-3', name: 'Dekorasi', code: 'DEK', password: 'dek123', isChair: false },
                    { id: 'div-4', name: 'Dokumentasi', code: 'DOK', password: 'dok123', isChair: false },
                    { id: 'div-5', name: 'Kesekretariatan', code: 'SEK', password: 'sek123', isChair: false },
                    { id: 'div-6', name: 'Perlengkapan', code: 'PER', password: 'per123', isChair: false },
                    { id: 'div-7', name: 'Humas', code: 'HUM', password: 'hum123', isChair: false },
                    { id: 'chair', name: 'Ketua', code: 'CHAIR', password: 'ketua123', isChair: true },
                ];
            }
            // Buat sample tasks (sama)
            const now = new Date();
            const tomorrow = new Date(now); tomorrow.setDate(now.getDate()+1);
            const nextWeek = new Date(now); nextWeek.setDate(now.getDate()+7);
            const sample = [
                { id: 'task-1', title: 'Menyusun proposal', description: 'Proposal acara besar', divisionId: 'div-2', deadline: nextWeek.toISOString().slice(0,10), status: 'pending', evidenceLink: '', assignedTo: 'Budi', createdAt: now.toISOString(), updatedAt: now.toISOString() },
                { id: 'task-2', title: 'Desain backdrop', description: 'Konsep panggung', divisionId: 'div-3', deadline: tomorrow.toISOString().slice(0,10), status: 'in_progress', evidenceLink: '', assignedTo: 'Siti', createdAt: now.toISOString(), updatedAt: now.toISOString() },
                { id: 'task-3', title: 'Rapat vendor', description: 'Koordinasi teknis', divisionId: 'div-1', deadline: now.toISOString().slice(0,10), status: 'done', evidenceLink: 'https://drive.google.com/xxx', assignedTo: 'Andi', createdAt: now.toISOString(), updatedAt: now.toISOString() },
            ];
            allTasks = (currentUserRole === 'ketua') ? sample : sample.filter(t => t.divisionId === currentUserDivision);
            renderAll();
        }

        // ========== RENDER (sama seperti sebelumnya) ==========
        function renderAll() {
            renderFilters();
            renderTasks();
            updateTaskCount();
        }

        function renderFilters() {
            filterContainer.innerHTML = '';
            if (currentUserRole === 'ketua') {
                const allBtn = document.createElement('button');
                allBtn.className = `tag-pill all text-xs px-3 py-1 rounded-full transition ${currentFilter === 'all' ? 'ring-2 ring-slate-700 ring-offset-1' : ''}`;
                allBtn.textContent = 'All';
                allBtn.onclick = () => { currentFilter = 'all'; renderAll(); };
                filterContainer.appendChild(allBtn);
            }
            let divisionsToShow = allDivisions;
            if (currentUserRole !== 'ketua' && currentUserDivision) {
                divisionsToShow = allDivisions.filter(d => d.id === currentUserDivision);
            }
            divisionsToShow.forEach(div => {
                const btn = document.createElement('button');
                const isActive = currentFilter === div.id;
                btn.className = `tag-pill text-xs px-3 py-1 rounded-full transition ${isActive ? 'ring-2 ring-slate-700 ring-offset-1 bg-slate-200' : 'bg-slate-100/70'}`;
                btn.textContent = `${div.code} • ${div.name}`;
                btn.onclick = () => { currentFilter = div.id; renderAll(); };
                filterContainer.appendChild(btn);
            });
        }

        function renderTasks() {
            const filtered = allTasks.filter(task => {
                if (currentTab === 'active') {
                    if (task.status === 'archived' || task.status === 'approved') return false;
                } else {
                    if (task.status !== 'archived' && task.status !== 'approved') return false;
                }
                if (currentFilter !== 'all' && task.divisionId !== currentFilter) return false;
                return true;
            });
            if (filtered.length === 0) {
                taskListContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            filtered.sort((a,b) => new Date(a.deadline) - new Date(b.deadline));
            let html = '';
            filtered.forEach(task => {
                const divCode = getDivisionCode(task.divisionId);
                const statusLabel = getStatusLabel(task.status);
                const isOver = isOverdue(task.deadline);
                const daysLeft = daysUntil(task.deadline);
                const isDone = task.status === 'done' || task.status === 'approved' || task.status === 'archived';
                const hasEvidence = task.evidenceLink && task.evidenceLink.trim() !== '';
                const showWarning = !isDone && daysLeft <= 3 && daysLeft >= 0 && task.status !== 'archived';
                let actionsHtml = '';
                if (currentUserRole === 'anggota' && !isDone && task.status !== 'archived') {
                    if (task.status === 'pending' || task.status === 'in_progress') {
                        actionsHtml += `<button onclick="markDone('${task.id}')" class="text-xs bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition flex items-center gap-1.5"><i class="fas fa-check-circle"></i> Selesai</button>`;
                    }
                    if (task.status === 'done' && !hasEvidence) {
                        actionsHtml += `<button onclick="openEvidenceModal('${task.id}')" class="text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition flex items-center gap-1.5"><i class="fas fa-link"></i> Kirim Bukti</button>`;
                    }
                }
                if (currentUserRole === 'ketua' && task.status === 'done' && hasEvidence) {
                    actionsHtml += `<button onclick="openApprovalModal('${task.id}')" class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition flex items-center gap-1.5"><i class="fas fa-clipboard-check"></i> QC</button>`;
                }
                if (currentUserRole === 'ketua' && task.status !== 'archived' && task.status !== 'approved') {
                    actionsHtml += `<button onclick="deleteTask('${task.id}')" class="text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-100 transition flex items-center gap-1.5"><i class="fas fa-trash-alt"></i></button>`;
                    actionsHtml += `<button onclick="editTask('${task.id}')" class="text-xs bg-slate-50 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-100 transition flex items-center gap-1.5"><i class="fas fa-pen"></i></button>`;
                }
                if (task.status === 'approved' || task.status === 'archived') {
                    actionsHtml = `<span class="text-xs text-emerald-600 font-medium flex items-center gap-1.5"><i class="fas fa-check-circle"></i> ${task.status === 'archived' ? 'Diarsipkan' : 'Disetujui'}</span>`;
                }
                let evidenceHtml = hasEvidence ? `<a href="${task.evidenceLink}" target="_blank" class="text-xs text-blue-600 hover:underline flex items-center gap-1"><i class="fas fa-external-link-alt"></i> Bukti</a>` : '';
                let deadlineBadge = '';
                if (showWarning) deadlineBadge = `<span class="deadline-warning text-xs bg-amber-100 text-amber-800 px-2.5 py-0.5 rounded-full flex items-center gap-1.5 font-medium"><i class="fas fa-clock"></i> ${daysLeft} hari lagi</span>`;
                else if (isOver && !isDone && task.status !== 'archived') deadlineBadge = `<span class="text-xs bg-red-100 text-red-700 px-2.5 py-0.5 rounded-full flex items-center gap-1.5 font-medium"><i class="fas fa-exclamation-circle"></i> Terlambat!</span>`;
                html += `
                    <div class="task-card glass-card rounded-xl p-4 border border-slate-200/60 shadow-sm fade-in">
                        <div class="flex flex-col md:flex-row md:items-start gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap mb-1">
                                    <span class="text-sm font-semibold text-slate-800">${task.title}</span>
                                    <span class="tag-pill bg-slate-100 text-slate-600 text-[0.6rem]">${divCode}</span>
                                    <span class="${getStatusBadgeClass(task.status)}">${statusLabel}</span>
                                    ${deadlineBadge}
                                </div>
                                ${task.description ? `<p class="text-sm text-slate-500 mb-1.5">${task.description}</p>` : ''}
                                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-400">
                                    <span><i class="far fa-calendar-alt mr-1"></i> Deadline: ${formatDate(task.deadline)}</span>
                                    ${task.assignedTo ? `<span><i class="far fa-user mr-1"></i> ${task.assignedTo}</span>` : ''}
                                    ${evidenceHtml}
                                    ${task.status === 'done' && !hasEvidence ? `<span class="text-amber-600"><i class="fas fa-exclamation-triangle mr-1"></i> Belum ada bukti</span>` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap md:flex-nowrap">${actionsHtml}</div>
                        </div>
                    </div>
                `;
            });
            taskListContainer.innerHTML = html;
        }

        function updateTaskCount() {
            const active = allTasks.filter(t => t.status !== 'archived' && t.status !== 'approved').length;
            const archived = allTasks.filter(t => t.status === 'archived' || t.status === 'approved').length;
            taskCount.textContent = `${allTasks.length} tugas • ${active} aktif • ${archived} arsip`;
        }

        // ========== UTILITY ==========
        function formatDate(d) { if(!d) return '-'; return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
        function isOverdue(d) { if(!d) return false; const today=new Date(); today.setHours(0,0,0,0); return new Date(d+'T00:00:00') < today; }
        function daysUntil(d) { if(!d) return Infinity; const today=new Date(); today.setHours(0,0,0,0); return Math.ceil((new Date(d+'T00:00:00') - today)/(1000*60*60*24)); }
        function getDivisionName(id) { const d=allDivisions.find(dv=>dv.id===id); return d?d.name:id; }
        function getDivisionCode(id) { const d=allDivisions.find(dv=>dv.id===id); return d?d.code:id; }
        function getStatusLabel(s) { const map={pending:'Menunggu', in_progress:'Proses', done:'Selesai', approved:'Disetujui', archived:'Diarsipkan'}; return map[s]||s; }
        function getStatusBadgeClass(s) { return 'status-badge '+(s||'pending'); }

        // ========== TAB ==========
        function setTab(tab) { currentTab=tab; document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('tab-active',el.dataset.tab===tab)); renderTasks(); }

        // ========== CRUD (sama) ==========
        function openTaskModal(taskId) { /* ... */ }
        function closeTaskModal() { /* ... */ }
        async function saveTask(e) { /* ... */ }
        function editTask(taskId) { openTaskModal(taskId); }
        async function deleteTask(taskId) { /* ... */ }
        async function markDone(taskId) { /* ... */ }
        function openEvidenceModal(taskId) { /* ... */ }
        function closeEvidenceModal() { /* ... */ }
        async function submitEvidence(e) { /* ... */ }
        function openApprovalModal(taskId) { /* ... */ }
        function closeApprovalModal() { /* ... */ }
        async function approveTask(approved) { /* ... */ }
        async function refreshData() { /* ... */ }

        // ========== INIT ==========
        const savedDivision = localStorage.getItem('userDivision');
        const savedRole = localStorage.getItem('userRole');
        if (savedDivision && savedRole) {
            currentUserDivision = savedDivision;
            currentUserRole = savedRole;
            currentFilter = (savedRole === 'ketua') ? 'all' : savedDivision;
            $('loginScreen').classList.add('hidden');
            $('app').classList.add('visible');
            userRoleDisplay.textContent = (savedRole === 'ketua') ? 'Ketua' : 'Anggota';
            loadDivisionsAndTasks();
        } else {
            $('loginScreen').classList.remove('hidden');
            $('app').classList.remove('visible');
        }
        document.querySelector('.tab-btn[data-tab="active"]')?.classList.add('tab-active');
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => m.classList.add('hidden')); });
        console.log('✅ Task Tracker siap!');
    </script>
</body>
</html>
